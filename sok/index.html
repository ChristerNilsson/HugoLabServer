	<script>

function setStorage(key,value){
	document.body.setAttribute(key, value);
	localStorage.setItem(key, value);
}

function setDefault(key,value) {
	if (localStorage.getItem(key) == null) {
		setStorage(key,value)
	} else {
		setStorage(key, localStorage.getItem(key))
	}
}
setDefault('theme','dark')
setDefault('fontsize','20px')
setDefault('font','Helvetica')

function updateRelativeTimes() {
	const roots = document.querySelectorAll('[data-lastmod]')
	const units = [
		{ seconds: 365 * 24 * 60 * 60, singular: "ett år", plural: "år" },
		{ seconds: 30 * 24 * 60 * 60, singular: "en månad", plural: "månader" },
		{ seconds: 24 * 60 * 60, singular: "en dag", plural: "dagar" },
		{ seconds: 60 * 60, singular: "en timme", plural: "timmar" },
		{ seconds: 60, singular: "en minut", plural: "minuter" },
	]

	for (const root of roots) {
		const lastmodUnix = Number(root.dataset.lastmod || 0)
		if (!Number.isFinite(lastmodUnix) || lastmodUnix <= 0) continue

		const nowUnix = Math.floor(Date.now() / 1000)
		const diffSeconds = Math.max(0, nowUnix - lastmodUnix)

		let value = 0
		let text = "nyss"

		for (const unit of units) {
			if (diffSeconds >= unit.seconds) {
				value = Math.floor(diffSeconds / unit.seconds)
				text = value === 1 ? unit.singular : `${value} ${unit.plural}`
				break
			}
		}

		const target = root.querySelector('.relative-time-value')
		if (target) target.textContent = text === "nyss" ? text : `för ${text} sedan`
	}
}

if (document.readyState === 'loading') {
	document.addEventListener('DOMContentLoaded', updateRelativeTimes)
} else {
	updateRelativeTimes()
}

</script>

		<h1>Sök</h1>
		<p>Sök i hela webbplatsens textinnehåll.</p>
<div class="search-panel" data-pagefind-ignore="all">
  <label class="search-label" for="pagefind-search-input">Sök</label>
  <input
    id="pagefind-search-input"
    class="search-input"
    type="search"
    placeholder="Sök på webbplatsen"
    autocomplete="off"
    spellcheck="false"
  >
  <p id="pagefind-status" class="search-status">Sökindex laddas.</p>
  <div id="pagefind-legend" class="search-legend" hidden></div>
  <ol id="pagefind-results" class="search-results" hidden></ol>
</div>
<script>
(() => {
  const stylesheet = document.querySelector('link[href$="styles.css"]');
  const baseUrl = stylesheet
    ? stylesheet.getAttribute("href").replace(/styles\.css$/, "")
    : "/";
  const bundlePath = `${baseUrl.replace(/\/?$/, "/")}pagefind/`;
  const scriptUrl = `${bundlePath}pagefind.js`;
  const MAX_TERMS = 26;
  let pagefind;
  let searchToken = 0;
  let debounceTimer;

  function normalize(text) {
    return (text || "").toLocaleLowerCase("sv");
  }

  function splitTerms(query) {
    const seen = new Set();
    const terms = [];

    for (const part of query.trim().split(/\s+/)) {
      const term = normalize(part);
      if (!term || seen.has(term)) continue;
      seen.add(term);
      terms.push(term);
      if (terms.length >= MAX_TERMS) break;
    }

    return terms;
  }

  function popcount(mask) {
    let count = 0;
    let value = mask;
    while (value > 0) {
      count += value & 1;
      value >>= 1;
    }
    return count;
  }

  function maskForTerms(text, terms) {
    let mask = 0;
    for (let index = 0; index < terms.length; index += 1) {
      if (text.includes(terms[index])) {
        mask |= 1 << (terms.length - index - 1);
      }
    }
    return mask;
  }

  function labelForMask(mask, terms) {
    if (!mask) return "";
    let label = "";
    for (let index = 0; index < terms.length; index += 1) {
      const bit = 1 << (terms.length - index - 1);
      if (mask & bit) {
        label += String.fromCharCode(65 + index);
      }
    }
    return label;
  }

  function renderLegend(terms) {
    const legend = document.getElementById("pagefind-legend");
    if (!legend) return;

    if (terms.length < 2) {
      legend.hidden = true;
      legend.innerHTML = "";
      return;
    }

    legend.hidden = false;
    legend.innerHTML = terms
      .map((term, index) => `<span><strong>${String.fromCharCode(65 + index)}</strong> = ${term}</span>`)
      .join("");
  }

  function renderResults(results, terms) {
    const list = document.getElementById("pagefind-results");
    if (!list) return;

    if (!results.length) {
      list.hidden = true;
      list.innerHTML = "";
      return;
    }

    list.hidden = false;
    list.innerHTML = results.map((result) => {
      const combo = result.comboLabel
        ? `<span class="search-combo">${result.comboLabel}</span>`
        : "";
      const title = result.meta.title || result.url.replace(baseUrl, "/");
      return `<li class="search-result">${combo}<a href="${result.url}">${title}</a></li>`;
    }).join("");
  }

  function setStatus(text) {
    const status = document.getElementById("pagefind-status");
    if (status) status.textContent = text;
  }

  function ensureScript() {
    if (window.pagefind) return Promise.resolve(window.pagefind);
    if (window.__pagefindPromise) return window.__pagefindPromise;

    window.__pagefindPromise = new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = scriptUrl;
      script.onload = () => resolve(window.pagefind);
      script.onerror = () => reject(new Error("Pagefind kunde inte laddas."));
      document.head.appendChild(script);
    });

    return window.__pagefindPromise;
  }

  async function ensurePagefind() {
    if (pagefind) return pagefind;
    pagefind = await ensureScript();
    await pagefind.options({ excerptLength: 0 });
    return pagefind;
  }

  async function search(query) {
    const currentToken = ++searchToken;
    const terms = splitTerms(query);

    renderLegend(terms);

    if (!query.trim()) {
      setStatus("Skriv ett eller flera ord för att söka.");
      renderResults([], terms);
      return;
    }

    setStatus("Söker …");

    try {
      const api = await ensurePagefind();
      const resultSet = await api.search(query);
      const loaded = await Promise.all(
        resultSet.results.map(async (result, index) => {
          const data = await result.data();
          const searchableText = normalize(
            [data.meta?.title, data.excerpt, data.content, result.url].filter(Boolean).join(" ")
          );
          const mask = maskForTerms(searchableText, terms);

          return {
            index,
            url: data.meta?.url || result.url,
            meta: data.meta || {},
            mask,
            comboLabel: labelForMask(mask, terms)
          };
        })
      );

      if (currentToken !== searchToken) return;

      loaded.sort((left, right) => {
        const countDiff = popcount(right.mask) - popcount(left.mask);
        if (countDiff !== 0) return countDiff;
        const maskDiff = right.mask - left.mask;
        if (maskDiff !== 0) return maskDiff;
        return left.index - right.index;
      });

      renderResults(loaded, terms);
      setStatus(`${loaded.length} träffar`);
    } catch (error) {
      if (currentToken !== searchToken) return;
      renderResults([], terms);
      setStatus("Sökindex finns inte i den här previewn ännu. Kör publiceringsbygget för att skapa Pagefind-indexet.");
    }
  }

  function boot() {
    const input = document.getElementById("pagefind-search-input");
    if (!input) return;

    input.focus();
    setStatus("Skriv ett eller flera ord för att söka.");

    input.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        search(input.value);
      }, 150);
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot, { once: true });
  } else {
    boot();
  }
})();
</script>
