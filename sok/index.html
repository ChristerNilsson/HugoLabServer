	<script>

function setStorage(key,value){
	document.body.setAttribute(key, value);
	localStorage.setItem(key, value);
}

function setDefault(key,value) {
	if (localStorage.getItem(key) == null) {
		setStorage(key,value)
	} else {
		setStorage(key, localStorage.getItem(key))
	}
}
setDefault('theme','dark')
setDefault('fontsize','20px')
setDefault('font','Helvetica')

function updateRelativeTimes() {
	const roots = document.querySelectorAll('[data-lastmod]')
	const units = [
		{ seconds: 365 * 24 * 60 * 60, singular: "ett år", plural: "år" },
		{ seconds: 30 * 24 * 60 * 60, singular: "en månad", plural: "månader" },
		{ seconds: 24 * 60 * 60, singular: "en dag", plural: "dagar" },
		{ seconds: 60 * 60, singular: "en timme", plural: "timmar" },
		{ seconds: 60, singular: "en minut", plural: "minuter" },
	]

	for (const root of roots) {
		const lastmodUnix = Number(root.dataset.lastmod || 0)
		if (!Number.isFinite(lastmodUnix) || lastmodUnix <= 0) continue

		const nowUnix = Math.floor(Date.now() / 1000)
		const diffSeconds = Math.max(0, nowUnix - lastmodUnix)

		let value = 0
		let text = "nyss"

		for (const unit of units) {
			if (diffSeconds >= unit.seconds) {
				value = Math.floor(diffSeconds / unit.seconds)
				text = value === 1 ? unit.singular : `${value} ${unit.plural}`
				break
			}
		}

		const target = root.querySelector('.relative-time-value')
		if (target) target.textContent = text === "nyss" ? text : `för ${text} sedan`
	}
}

if (document.readyState === 'loading') {
	document.addEventListener('DOMContentLoaded', updateRelativeTimes)
} else {
	updateRelativeTimes()
}

</script>

		<h1>Sök</h1>
		<p>Sök i hela webbplatsens textinnehåll.</p>
<div class="search-panel" data-pagefind-ignore="all">
  <input
    id="pagefind-search-input"
    class="search-input"
    type="search"
    placeholder="Skriv ett eller flera ord"
    autocomplete="off"
    spellcheck="false"
  >
  <p id="pagefind-status" class="search-status">Sökindex laddas.</p>
  <div id="pagefind-legend" class="search-legend" hidden></div>
  <ol id="pagefind-results" class="search-results" hidden></ol>
</div>
<script type="module">
(() => {
  const stylesheet = document.querySelector('link[href$="styles.css"]');
  const baseUrl = stylesheet
    ? stylesheet.getAttribute("href").replace(/styles\.css$/, "")
    : "/";
  const bundlePath = `${baseUrl.replace(/\/?$/, "/")}pagefind/`;
  const scriptUrl = `${bundlePath}pagefind.js`;
  const MAX_TERMS = 26;
  let pagefind;
  let searchToken = 0;
  let debounceTimer;
  let suppressHistoryUpdate = false;

  function splitTerms(query) {
    const seen = new Set();
    const terms = [];

    for (const part of query.trim().split(/\s+/)) {
      const term = (part || "").toLocaleLowerCase("sv");
      if (!term || seen.has(term)) continue;
      seen.add(term);
      terms.push(term);
      if (terms.length >= MAX_TERMS) break;
    }

    return terms;
  }

  function popcount(mask) {
    let count = 0;
    let value = mask;
    while (value > 0) {
      count += value & 1;
      value >>= 1;
    }
    return count;
  }

  function labelForMask(mask, terms) {
    if (!mask) return "";
    let label = "";
    for (let index = 0; index < terms.length; index += 1) {
      const bit = 1 << (terms.length - index - 1);
      if (mask & bit) {
        label += String.fromCharCode(65 + index);
      }
    }
    return label;
  }

  function matchesTermPrefix(text, term) {
    const haystack = (text || "").toLocaleLowerCase("sv");
    const needle = (term || "").toLocaleLowerCase("sv");
    if (!needle) return false;
    return haystack
      .split(/[^0-9\p{L}_-]+/u)
      .some((word) => word && word.startsWith(needle));
  }

  function resolveUrl(result, data) {
    const rawUrl = data?.url || data?.meta?.url || result?.url || "";
    if (!rawUrl) return "";
    if (/^https?:\/\//.test(rawUrl)) return rawUrl;
    if (rawUrl.startsWith(baseUrl)) return rawUrl;
    if (rawUrl.startsWith("/")) return `${baseUrl.replace(/\/$/, "")}${rawUrl}`;
    return `${baseUrl.replace(/\/?$/, "/")}${rawUrl.replace(/^\//, "")}`;
  }

  function renderLegend(terms) {
    const legend = document.getElementById("pagefind-legend");
    if (!legend) return;

    if (terms.length < 2) {
      legend.hidden = true;
      legend.innerHTML = "";
      return;
    }

    legend.hidden = false;
    legend.innerHTML = terms
      .map((term, index) => `<span><strong>${String.fromCharCode(65 + index)}</strong> = ${term}</span>`)
      .join("");
  }

  function renderResults(results) {
    const list = document.getElementById("pagefind-results");
    if (!list) return;

    if (!results.length) {
      list.hidden = true;
      list.innerHTML = "";
      return;
    }

    const showCombos = results.some((result) => result.termCount > 1);

    list.hidden = false;
    list.innerHTML = results.map((result) => {
      const combo = showCombos && result.comboLabel
        ? `<span class="search-combo">${result.comboLabel}</span>`
        : "";
      const href = result.url || "#";
      const fallbackTitle = href ? href.replace(baseUrl, "/") : "(utan titel)";
      const title = result.meta.title || fallbackTitle;
      return `<li class="search-result">${combo}<a href="${href}">${title}</a></li>`;
    }).join("");
  }

  function setStatus(text) {
    const status = document.getElementById("pagefind-status");
    if (status) status.textContent = text;
  }

  function getQueryFromLocation() {
    const url = new URL(window.location.href);
    return url.searchParams.get("q") || "";
  }

  function updateHistory(query) {
    if (suppressHistoryUpdate) return;
    const url = new URL(window.location.href);
    if (query.trim()) {
      url.searchParams.set("q", query);
    } else {
      url.searchParams.delete("q");
    }
    window.history.replaceState({}, "", url);
  }

  function ensureScript() {
    if (window.__pagefindPromise) return window.__pagefindPromise;

    window.__pagefindPromise = import(scriptUrl).catch(() => {
      throw new Error("Pagefind kunde inte laddas.");
    });

    return window.__pagefindPromise;
  }

  async function ensurePagefind() {
    if (pagefind) return pagefind;
    pagefind = await ensureScript();
    await pagefind.options({
      excerptLength: 0,
      baseUrl,
      bundlePath
    });
    if (typeof pagefind.init === "function") {
      await pagefind.init();
    }
    return pagefind;
  }

  async function search(query) {
    const currentToken = ++searchToken;
    const terms = splitTerms(query);
    updateHistory(query);

    renderLegend(terms);

    if (!query.trim()) {
      setStatus("Skriv ett eller flera ord för att söka.");
      renderResults([]);
      return;
    }

    setStatus("Söker …");

    try {
      const api = await ensurePagefind();
      const searches = await Promise.all(terms.map((term) => api.search(term)));
      const merged = new Map();

      searches.forEach((resultSet, termIndex) => {
        const bit = 1 << (terms.length - termIndex - 1);

        resultSet.results.forEach((result, resultIndex) => {
          const id = result.id || `${termIndex}:${resultIndex}`;
          const existing = merged.get(id);

          if (existing) {
            existing.mask |= bit;
            existing.rank = Math.min(existing.rank, resultIndex);
            return;
          }

          merged.set(id, {
            result,
            mask: bit,
            rank: resultIndex
          });
        });
      });

      const loaded = await Promise.all(
        Array.from(merged.values()).map(async ({ result, mask, rank }) => {
          const data = await result.data();
          const searchableText = [
            data.url,
            data.meta?.title,
            data.content,
            data.excerpt
          ].filter(Boolean).join(" ");

          let verifiedMask = 0;
          for (let termIndex = 0; termIndex < terms.length; termIndex += 1) {
            const bit = 1 << (terms.length - termIndex - 1);
            if ((mask & bit) && matchesTermPrefix(searchableText, terms[termIndex])) {
              verifiedMask |= bit;
            }
          }

          return {
            index: rank,
            url: resolveUrl(result, data),
            meta: data.meta || {},
            mask: verifiedMask,
            termCount: terms.length,
            comboLabel: labelForMask(verifiedMask, terms)
          };
        })
      );

      if (currentToken !== searchToken) return;

      const filtered = loaded.filter((result) => result.mask !== 0);

      filtered.sort((left, right) => {
        const countDiff = popcount(right.mask) - popcount(left.mask);
        if (countDiff !== 0) return countDiff;

        const labelDiff = left.comboLabel.localeCompare(right.comboLabel, "sv");
        if (labelDiff !== 0) return labelDiff;

        return left.index - right.index;
      });

      renderResults(filtered);
      setStatus(`${filtered.length} träffar`);
    } catch (error) {
      console.error("Pagefind search failed", error);
      if (currentToken !== searchToken) return;
      renderResults([]);
      setStatus(`Sökfel: ${error?.message || "okänt fel"}`);
    }
  }

  function boot() {
    const input = document.getElementById("pagefind-search-input");
    if (!input) return;

    const initialQuery = getQueryFromLocation();
    input.value = initialQuery;
    setStatus("Skriv ett eller flera ord för att söka.");

    if (initialQuery.trim()) {
      suppressHistoryUpdate = true;
      search(initialQuery).finally(() => {
        suppressHistoryUpdate = false;
      });
    }

    window.addEventListener("pageshow", () => {
      const restoredQuery = getQueryFromLocation();
      if (input.value !== restoredQuery) {
        input.value = restoredQuery;
      }
      suppressHistoryUpdate = true;
      search(restoredQuery).finally(() => {
        suppressHistoryUpdate = false;
      });
    });

    window.addEventListener("popstate", () => {
      const restoredQuery = getQueryFromLocation();
      input.value = restoredQuery;
      suppressHistoryUpdate = true;
      search(restoredQuery).finally(() => {
        suppressHistoryUpdate = false;
      });
    });

    input.focus();

    input.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        search(input.value);
      }, 150);
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot, { once: true });
  } else {
    boot();
  }
})();
</script>
